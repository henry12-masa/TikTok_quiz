<html lang="ja">
<head>
<meta charset="UTF-8">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:sans-serif;
  background:linear-gradient(135deg,#111827,#ec4899);
  color:#fff;
  min-height:100vh;
}

header{text-align:center;padding:30px 15px}
header h1{
  font-size:42px;
  color:#25F4EE;
  margin-bottom:10px;
  text-shadow:2px 2px 0 #FE2C55;
}
header p{
  font-weight:bold;
  color:#fce7f3;
}

.container{
  max-width:900px;
  margin:auto;
  padding:15px;
}

.ad-area{
  background:#fff;
  padding:15px;
  border-radius:18px;
  margin-bottom:20px;
}

.quiz-box{
  background:#1f2937;
  border-radius:24px;
  padding:25px;
  box-shadow:0 10px 25px rgba(0,0,0,.35);
}

.top{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:20px;
}

.badge,.score{
  padding:10px 18px;
  border-radius:999px;
  font-weight:bold;
}

.badge{
  background:#25F4EE;
  color:#111827;
}

.score{
  background:#22c55e;
  color:#052e16;
}

.progress{
  width:100%;
  height:12px;
  background:#374151;
  border-radius:999px;
  overflow:hidden;
  margin-bottom:25px;
}

.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#25F4EE,#FE2C55);
  transition:.3s;
}

#question{
  font-size:28px;
  font-weight:bold;
  line-height:1.6;
  margin-bottom:25px;
}

.choices{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.choice-btn{
  border:none;
  background:#374151;
  color:#fff;
  border:2px solid #25F4EE;
  padding:18px;
  border-radius:18px;
  cursor:pointer;
  font-size:17px;
  font-weight:bold;
  transition:.2s;
}

.choice-btn:hover{
  background:#4b5563;
  transform:translateY(-2px);
}

.correct{
  background:#22c55e!important;
  border-color:#22c55e!important;
  color:#052e16!important;
}

.wrong{
  background:#ef4444!important;
  border-color:#ef4444!important;
}

#result{
  margin-top:22px;
  font-size:22px;
  font-weight:bold;
  min-height:40px;
}

.final{
  text-align:center;
  padding:40px 10px;
}

.final h2{
  font-size:40px;
  margin-bottom:20px;
  color:#25F4EE;
}

.final p{
  font-size:24px;
  margin-bottom:20px;
}

.restart-btn{
  border:none;
  background:#FE2C55;
  color:#fff;
  padding:15px 30px;
  border-radius:999px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
}

@media(max-width:700px){
  .choices{
    grid-template-columns:1fr;
  }

  #question{
    font-size:22px;
  }
}
</style>
</head>

function shuffle(array){
  const arr = [...array];
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function generateQuestions(){
  selectedQuestions = shuffle(quizData).slice(0,TOTAL);
}

  shuffle(q.choices).forEach(choice=>{
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.innerHTML = choice;
    btn.onclick = () => checkAnswer(btn,choice,q.a);
    choicesEl.appendChild(btn);
  });
}

function checkAnswer(btn,selected,correct){

  const buttons = document.querySelectorAll(".choice-btn");

  buttons.forEach(b=>{
    b.disabled = true;

    if(b.innerHTML === correct){
      b.classList.add("correct");
    }
  });

  if(selected === correct){
    score++;
    btn.classList.add("correct");
    resultEl.innerHTML = "✅ 正解！";
    resultEl.style.color = "#22c55e";
  }else{
    btn.classList.add("wrong");
    resultEl.innerHTML = "❌ 不正解！ 正解は「" + correct + "」";
    resultEl.style.color = "#ef4444";
  }

  scoreEl.innerHTML = "正解数 " + score;

  progressBar.style.width = ((current+1)/TOTAL)*100 + "%";

  setTimeout(()=>{
    current++;

    if(current >= TOTAL){
      showFinal();
    }else{
      showQuestion();
    }

  },900);
}

function showFinal(){

  const percent = Math.round((score/TOTAL)*100);

  quizBox.innerHTML = `
  <div class="final">
    <h2>🎉 クイズ終了！</h2>
    <p>${score} / ${TOTAL} 問正解！</p>
    <p>正答率 ${percent}%</p>
    <button class="restart-btn" onclick="location.reload()">もう一度遊ぶ</button>
  </div>
  `;
}

generateQuestions();
showQuestion();
</script>

</body>
</html>
